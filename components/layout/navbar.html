<header class="header">

    <nav class="navbar">

        <!-- Logo -->

        <div class="navbar__logo">

            <a href="index.html">

                <img
                    src="/assets/img/logos/logo.png"
                    alt="EcoMart Logo">

                <span>

                    EcoMart

                </span>

            </a>

        </div>

        <!-- Barra de búsqueda -->

        <div class="navbar__search">

            <input
                type="text"
                id="searchInput"
                placeholder="¿Qué producto estás buscando?">

            <button
                id="searchButton"
                type="button">

                <i class="fa-solid fa-magnifying-glass"></i>

            </button>

        </div>

        <!-- Acciones -->

        <div class="navbar__actions">

            <button
                id="loginButton"
                class="navbar__button">

                <i class="fa-regular fa-user"></i>

                <span>

                    Ingresar

                </span>

            </button>

            <button
                id="favoriteButton"
                class="navbar__button"
                aria-label="Favoritos">

                <i class="fa-regular fa-heart"></i>

            </button>

            <button
                id="cartButton"
                class="navbar__button"
                aria-label="Carrito">

                <i class="fa-solid fa-cart-shopping"></i>

                <span
                    id="cartCounter">

                    0

                </span>

            </button>

        </div>

    </nav>

</header>
